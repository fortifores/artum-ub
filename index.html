      /* --- MORPH BUTTON CSS --- */
      .morph-btn {
        position: relative;
        padding: 22px 56px;
        background: transparent;
        border: none;
        cursor: pointer;
        overflow: visible;
        isolation: isolate;
      }

      .morph-btn .btn-fill {
        position: absolute;
        inset: 0;
        background: rgba(28, 25, 23, 0.8);
        border: 1px solid #44403c;
        border-radius: 4px;
        transition: border-radius 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55), border-color 0.3s ease;
        z-index: 1;
      }

      .morph-btn:hover .btn-fill {
        border-radius: 50px;
        border-color: #78716c;
        animation: jelly 0.5s ease;
      }

      @keyframes jelly {
        0% { transform: scale(1, 1); }
        30% { transform: scale(1.15, 0.85); }
        50% { transform: scale(0.9, 1.1); }
        70% { transform: scale(1.05, 0.95); }
        100% { transform: scale(1, 1); }
      }

      .morph-btn .orbit-dots {
        position: absolute;
        inset: -30px;
        pointer-events: none;
        z-index: 0;
      }

      .morph-btn .orbit-dots span {
        position: absolute;
        width: 6px;
        height: 6px;
        background: #b45309;
        border-radius: 50%;
        opacity: 0;
        transition: opacity 0.3s ease;
        box-shadow: 0 0 10px #b45309;
      }

      .morph-btn:hover .orbit-dots span {
        opacity: 1;
      }

      .morph-btn .orbit-dots span:nth-child(1) { top: 0; left: 50%; animation: orbit1 3s linear infinite; }
      .morph-btn .orbit-dots span:nth-child(2) { bottom: 0; left: 50%; animation: orbit2 3s linear infinite; }
      .morph-btn .orbit-dots span:nth-child(3) { top: 50%; left: 0; animation: orbit3 4s linear infinite; }
      .morph-btn .orbit-dots span:nth-child(4) { top: 50%; right: 0; animation: orbit4 4s linear infinite; }

      @keyframes orbit1 {
        0% { transform: translateX(-50%) translateY(0) scale(1); }
        25% { transform: translateX(30px) translateY(10px) scale(0.6); }
        50% { transform: translateX(-50%) translateY(20px) scale(1); }
        75% { transform: translateX(-80px) translateY(10px) scale(0.6); }
        100% { transform: translateX(-50%) translateY(0) scale(1); }
      }
      @keyframes orbit2 {
        0% { transform: translateX(-50%) translateY(0) scale(0.6); }
        25% { transform: translateX(-80px) translateY(-10px) scale(1); }
        50% { transform: translateX(-50%) translateY(-20px) scale(0.6); }
        75% { transform: translateX(30px) translateY(-10px) scale(1); }
        100% { transform: translateX(-50%) translateY(0) scale(0.6); }
      }
      @keyframes orbit3 {
        0% { transform: translateY(-50%) translateX(0) scale(0.8); }
        50% { transform: translateY(-50%) translateX(-15px) scale(1.2); }
        100% { transform: translateY(-50%) translateX(0) scale(0.8); }
      }
      @keyframes orbit4 {
        0% { transform: translateY(-50%) translateX(0) scale(1.2); }
        50% { transform: translateY(-50%) translateX(15px) scale(0.8); }
        100% { transform: translateY(-50%) translateX(0) scale(1.2); }
      }

      .morph-btn .btn-text {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        z-index: 3;
      }

      .morph-btn .btn-text .char {
        display: inline-block;
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        transition-delay: calc(var(--i) * 0.03s);
      }

      .morph-btn:hover .btn-text .char {
        transform: translateY(-100%);
        animation: letterBounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        animation-delay: calc(var(--i) * 0.03s);
      }

      @keyframes letterBounce {
        0% { transform: translateY(0); }
        40% { transform: translateY(-120%); }
        70% { transform: translateY(10%); }
        100% { transform: translateY(0); }
      }

      .morph-btn .corners span {
        position: absolute;
        width: 15px;
        height: 15px;
        border: 2px solid #b45309;
        transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        opacity: 0.5;
        z-index: 2;
      }

      .morph-btn .corners span:nth-child(1) { top: -6px; left: -6px; border-right: none; border-bottom: none; }
      .morph-btn .corners span:nth-child(2) { top: -6px; right: -6px; border-left: none; border-bottom: none; }
      .morph-btn .corners span:nth-child(3) { bottom: -6px; left: -6px; border-right: none; border-top: none; }
      .morph-btn .corners span:nth-child(4) { bottom: -6px; right: -6px; border-left: none; border-top: none; }

      .morph-btn:hover .corners span { opacity: 1; border-color: #d97706; }
      .morph-btn:hover .corners span:nth-child(1) { transform: translate(-5px, -5px) rotate(-5deg); }
      .morph-btn:hover .corners span:nth-child(2) { transform: translate(5px, -5px) rotate(5deg); }
      .morph-btn:hover .corners span:nth-child(3) { transform: translate(-5px, 5px) rotate(5deg); }
      .morph-btn:hover .corners span:nth-child(4) { transform: translate(5px, 5px) rotate(-5deg); }

      .morph-btn .shadow {
        position: absolute;
        inset: 5px;
        background: rgba(180, 83, 9, 0.2);
        border-radius: 4px;
        filter: blur(15px);
        z-index: 0;
        transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        transform: translateY(10px);
      }

      .morph-btn:hover .shadow {
        border-radius: 50px;
        transform: translateY(15px) scale(1.1);
        filter: blur(20px);
        background: rgba(180, 83, 9, 0.4);
      }

      .morph-btn:active .btn-fill { transform: scale(0.92); transition: transform 0.1s ease; }
      .morph-btn:active .shadow { transform: translateY(3px) scale(0.85); filter: blur(8px); opacity: 0.5; transition: all 0.1s ease; }
      .morph-btn:active .btn-text { transform: scale(0.95); transition: transform 0.1s ease; }
      .morph-btn:active .corners span:nth-child(1) { transform: translate(-15px, -15px) rotate(-15deg) scale(0.8); }
      .morph-btn:active .corners span:nth-child(2) { transform: translate(15px, -15px) rotate(15deg) scale(0.8); }
      .morph-btn:active .corners span:nth-child(3) { transform: translate(-15px, 15px) rotate(15deg) scale(0.8); }
      .morph-btn:active .corners span:nth-child(4) { transform: translate(15px, 15px) rotate(-15deg) scale(0.8); }
      .morph-btn:active .orbit-dots span { animation-play-state: paused; transform: scale(1.5); }

      /* --- GLOW BUTTON CSS (Hero) --- */
      .glow-btn {
        text-decoration: none;
        position: relative;
        border: 1px solid #b45309;
        font-size: 0.875rem;
        font-family: 'Cinzel', serif;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        color: #fef3c7;
        display: inline-block;
        padding: 0.75rem 2rem;
        text-align: center;
        background: linear-gradient(90deg, rgba(127, 29, 29, 0.8), rgba(28, 25, 23, 0.8), rgba(180, 83, 9, 0.8), rgba(127, 29, 29, 0.8));
        background-size: 300%;
        border-radius: 4px;
        z-index: 1;
        transition: transform 0.3s ease, color 0.3s ease;
        backdrop-filter: blur(4px);
      }

      .glow-btn:hover {
        animation: glow-ani 8s linear infinite;
        border-color: transparent;
        color: #fff;
        transform: translateY(-2px);
      }

      @keyframes glow-ani {
        0% { background-position: 0%; }
        100% { background-position: 400%; }
      }

      .glow-btn:before {
        content: "";
        position: absolute;
        top: -3px; left: -3px; right: -3px; bottom: -3px;
        z-index: -1;
        background: linear-gradient(90deg, #7f1d1d, #b45309, #78350f, #7f1d1d);
        background-size: 400%;
        border-radius: 6px;
        transition: filter 1s, opacity 1s;
        opacity: 0;
      }

      .glow-btn:hover::before {
        filter: blur(15px);
        opacity: 1;
        animation: glow-ani 8s linear infinite;
      }

      .glow-btn:active {
        background: linear-gradient(32deg, rgba(127, 29, 29, 0.8), rgba(28, 25, 23, 0.8), rgba(180, 83, 9, 0.8), rgba(127, 29, 29, 0.8));
        transform: translateY(0);
      }

        opacity: 0;
        transition-duration: 0.3s;
      }

      .social-text {
        position: absolute;
        color: #f59e0b;
        width: 120px;
        font-weight: 700;
        opacity: 0;
        transition-duration: 0.4s;
        font-family: 'Cinzel', serif;
        font-size: 11px;
        text-align: center;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .social-btn .svgIcon {
        transition-duration: 0.3s;
        width: 20px;

      }

      /* --- GALLERY CARDS CSS --- */
      .gallery-container {
        padding: 0;
        box-sizing: border-box;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent;
      }

      .gallery-card-body {
        width: 100%;
        max-width: 1000px;
        height: 400px;
        display: flex;
        justify-content: center;
        align-items: stretch;
        gap: 1.25rem;
        transition: all 400ms;
      }

      .gallery-card {
        flex: 1;
        height: 100%;
        transition: all 400ms;
        cursor: pointer;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #292524;
      }
      
      .gallery-card > img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gallery-card-body:has(.gallery-card:hover) .gallery-card:not(:hover) {
        filter: grayscale(100%);
      }
      .gallery-card:hover {
        flex: 3;
        border-color: #b45309;
      }

      /* --- INSTRUCTION BUTTON CSS --- */
      .instruction-btn {
        font-size: 1.2rem;
        padding: 1rem 2.5rem;
        border: 1px solid #78350f; /* amber-900 */
        outline: none;
        border-radius: 0.4rem;

        text-transform: uppercase;
        background-color: #0c0a09; /* stone-950 */

        font-weight: 700;
        transition: 0.6s;
        box-shadow: 0px 0px 40px rgba(180, 83, 9, 0.3); /* amber-700 shadow */
        -webkit-box-reflect: below 10px linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.5));
        letter-spacing: 0.1em;
      }

      .instruction-btn:active {
        scale: 0.92;
      }

      .instruction-btn:hover {
        background: linear-gradient(270deg, rgba(120, 53, 15, 0.9) 0%, rgba(217, 119, 6, 0.9) 60%); /* amber-900 to amber-600 */
        color: #fff;
        box-shadow: 0px 0px 60px rgba(217, 119, 6, 0.6);
        border-color: rgba(217, 119, 6, 0.8);
      }

      const MusicPlayer = () => {
        const [isPlaying, setIsPlaying] = useState(false);
        const [showVolume, setShowVolume] = useState(false);
        const [volume, setVolume] = useState(0.1);
        const audioRef = useRef(null);
        const longPressRef = useRef(null);
        const containerRef = useRef(null);

        useEffect(() => {
          const audio = new Audio("music/Forti Fores - Essence of Dreams (DEMO).wav");
          audio.loop = true;
          audio.volume = 0.1;
          audioRef.current = audio;
          return () => { audio.pause(); audioRef.current = null; };
        }, []);

        useEffect(() => {
          const handleClickOutside = (e) => {
            if (lockedRef.current) return;
            if (containerRef.current && !containerRef.current.contains(e.target)) {
              setShowVolume(false);
            }
          };
          document.addEventListener('mousedown', handleClickOutside);
          document.addEventListener('touchstart', handleClickOutside);
          return () => {
            document.removeEventListener('mousedown', handleClickOutside);
            document.removeEventListener('touchstart', handleClickOutside);
          };
        }, []);

        const togglePlay = () => {
          if (!audioRef.current) return;
          if (isPlaying) { audioRef.current.pause(); }
          else { audioRef.current.play().catch(e => console.error("Audio playback failed:", e)); }
          setIsPlaying(!isPlaying);
        };

        const handleRightClick = (e) => {
          e.preventDefault();
          setShowVolume(prev => !prev);
        };

        const handleVolumeChange = (e) => {
          const val = parseFloat(e.target.value);
          setVolume(val);
          if (audioRef.current) audioRef.current.volume = val;
        };

        const longFiredRef = useRef(false);
        const lockedRef = useRef(false);

        const handleTouchStart = (e) => {
          longFiredRef.current = false;
          longPressRef.current = setTimeout(() => {
            longFiredRef.current = true;
            lockedRef.current = true;
            setShowVolume(true);
            // Unlock after 3 seconds
            setTimeout(() => { lockedRef.current = false; }, 3000);
          }, 500);
        };
        const handleTouchEnd = (e) => {
          if (longPressRef.current) clearTimeout(longPressRef.current);
          if (longFiredRef.current) {
            e.preventDefault();
            longFiredRef.current = false;
          }
        };

        const volumePercent = Math.round(volume * 100);

        return (
          <div className="relative" ref={containerRef}>
            <button
              onClick={togglePlay}
              onContextMenu={handleRightClick}
              onTouchStart={handleTouchStart}
              onTouchEnd={handleTouchEnd}
              onTouchMove={() => { if (longPressRef.current) clearTimeout(longPressRef.current); }}
              className="flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-full bg-stone-900/50 border border-stone-800 hover:border-amber-700/50 transition-all duration-300 group shadow-lg select-none"
              aria-label={isPlaying ? "Pause music" : "Play music"}
            >
              <Disc size={20} className={`transition-all duration-500 ${isPlaying ? 'animate-spin-neon' : 'text-amber-600 opacity-70 group-hover:opacity-100'}`} />
            </button>

            {showVolume && (
              <div className="absolute top-full left-0 mt-2 z-[70] animate-fade-in-up">
                <div className="bg-stone-900/95 border border-stone-700 rounded-lg shadow-2xl px-3 py-3 flex flex-col items-center gap-2" style={{minWidth:'40px'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d97706" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                  </svg>
                  <input
                    type="range"
                    min="0"
                    max="1"
                    step="0.01"
                    value={volume}
                    onChange={handleVolumeChange}
                    className="appearance-none cursor-pointer outline-none"
                    style={{
                      writingMode: 'vertical-lr',
                      direction: 'rtl',
                      WebkitAppearance: 'slider-vertical',
                      width: '6px',
                      height: '72px',
                      borderRadius: '9999px',
                      background: `linear-gradient(to top, #d97706 ${volumePercent}%, #292524 ${volumePercent}%)`,
                    }}
                  />
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#57534e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <line x1="23" y1="9" x2="17" y2="15"/>
                    <line x1="17" y1="9" x2="23" y2="15"/>
                  </svg>
                  <span className="font-heading text-amber-600 tabular-nums" style={{fontSize:'9px'}}>{volumePercent}%</span>
                </div>
              </div>
            )}
          </div>
        );
      };

                {content.features.items.map((feature) => (
                  <div key={feature.id} className="group relative bg-stone-950/60 backdrop-blur-sm p-8 border border-stone-800 hover:border-amber-800 transition-all duration-300 hover:-translate-y-2">
                    <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-700/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div className="mb-6 inline-flex items-center justify-center w-16 h-16 rounded-full bg-stone-900/80 text-amber-600 group-hover:text-amber-400 group-hover:bg-stone-800 transition-colors border border-stone-800">{getIcon(feature.icon)}</div>
                    <h3 className="text-xl font-heading font-bold mb-4 text-stone-200 group-hover:text-amber-500 transition-colors">{feature.title}</h3>
                    <p className="text-stone-400 leading-relaxed">{feature.description}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const Gallery = ({ content, openLightbox }) => {
        const galleryImages = [
          "https://pbs.twimg.com/media/HAJ_f46X0AA5U49?format=jpg&name=900x900",
          "https://pbs.twimg.com/media/HAaBa3dXwAAMicT?format=jpg&name=large",
          "https://pbs.twimg.com/media/HDZePj0XUAAaDAS?format=jpg&name=large",
          "https://pbs.twimg.com/media/HDdrl8wXYAAILmx?format=jpg&name=large"
        ];

        return (
          <section id="gallery" className="py-24 relative">
            <div className="absolute inset-0 bg-stone-950/70 z-[-1]"></div>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="mb-16 flex flex-col items-center text-center">
                <span className="font-heading text-amber-600 tracking-widest uppercase text-sm mb-2">{content.gallery.subtitle}</span>
                <h2 className="text-3xl md:text-5xl font-heading font-bold text-white">{content.gallery.title}</h2>
              </div>
              
              <div className="gallery-container">
                <div className="gallery-card-body">
                  {galleryImages.map((imgSrc, index) => (
                    <div key={index} className="gallery-card" onClick={() => openLightbox(imgSrc)}>
                      <img src={imgSrc} alt={`Gallery image ${index + 1}`} />
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </section>
        );
      };

      const OurGame = ({ content, openLightbox }) => {
        const [showNotification, setShowNotification] = useState(false);
        const images = [
          "https://pbs.twimg.com/media/HDozRYQXsAAUZKk?format=jpg&name=large",
          "https://pbs.twimg.com/media/HDozRYTWMAAaWWb?format=jpg&name=large",
          "https://pbs.twimg.com/media/HDozRYTX0AEjX6m?format=jpg&name=large",
          "https://pbs.twimg.com/media/HDozTkhXkAA1kEk?format=jpg&name=large",
          "https://pbs.twimg.com/media/HDozTkjWoAA75nS?format=jpg&name=large"
        ];

        useEffect(() => {
          if (showNotification) {
            const timer = setTimeout(() => setShowNotification(false), 4000);
            return () => clearTimeout(timer);
          }
        }, [showNotification]);

        return (
          <section id="game" className="py-24 relative overflow-hidden border-t border-stone-900">
            <div className="absolute inset-0 bg-stone-950/70 z-[-1]"></div>
            <div className="max-w-[1536px] mx-auto px-4 text-center">
              <div className="mb-16">
                <h2 className="text-4xl md:text-5xl font-heading font-bold text-stone-100 mb-4 tracking-wider">{content.game.title}</h2>
                <div className="w-24 h-1 bg-amber-700 mx-auto rounded-full mb-4"></div>
                <p className="font-heading text-amber-600 uppercase tracking-widest text-sm">
                  {content.game.status}
                </p>
              </div>

              <div className="scrolling-container mx-auto">
                {[...Array(10)].map((_, i) => (
                  <div key={i} className={`scrolling-item scrolling-item${i + 1}`}>
                    <img src={images[i % 5]} alt={`Game preview ${i + 1}`} referrerPolicy="no-referrer" />
                  </div>
                ))}
              </div>

              <div className="mt-16 flex justify-center w-full">
                <div className="relative flex justify-center w-fit">
                  <button 
                    onClick={() => setShowNotification(true)}
                    className="morph-btn font-heading text-sm uppercase tracking-widest group"
                  >
                    <div className="shadow"></div>
                    <div className="btn-fill backdrop-blur-sm"></div>
                    <div className="corners">
                      <span></span><span></span><span></span><span></span>
                    </div>
                    <div className="orbit-dots">
                      <span></span><span></span><span></span><span></span>
                    </div>
                    <div className="btn-text text-stone-400 group-hover:text-stone-200 transition-colors">
                      <Lock size={18} className="text-amber-700 group-hover:text-amber-500 transition-colors" />
                      <div className="flex">
                        {content.game.buttonLabel.split('').map((char, index) => (
                          <span key={index} className="char" style={{ '--i': index }}>{char === ' ' ? '\u00A0' : char}</span>
                        ))}
                      </div>
                    </div>
                  </button>

                  {showNotification && (
                    <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-4 z-50">
                      <div className="w-[300px] md:w-[400px] bg-stone-900 border border-amber-700/50 text-stone-200 px-6 py-4 rounded-sm shadow-2xl animate-fade-in-up flex items-center justify-between gap-4">
                        <Lock className="text-amber-600 shrink-0" size={20} />
                        <div className="text-center flex-1">
                          <p className="text-sm leading-relaxed">{content.game.notification}</p>
                        </div>
                        <button onClick={() => setShowNotification(false)} className="text-stone-500 hover:text-stone-300 transition-colors shrink-0">
                          <X size={16} />
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>
        );
      };

      const InstructionTeaser = ({ content, setCurrentPage }) => (
        <section id="instructions-teaser" className="py-24 relative overflow-hidden flex flex-col justify-center items-center border-t border-stone-900/50">
          <div className="absolute inset-0 bg-stone-950/60 z-[-1]"></div>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div className="mb-12 flex flex-col items-center text-center">
              <span className="font-heading text-amber-600 tracking-widest uppercase text-sm mb-2">{content.instructions.teaserSubtitle}</span>
              <h2 className="text-3xl md:text-5xl font-heading font-bold text-white">{content.instructions.teaserTitle}</h2>
            </div>
            <div className="text-center z-10 px-4">
              <button onClick={() => { setCurrentPage('instructions'); window.scrollTo(0, 0); }} className="instruction-btn font-heading">
                {content.instructions.btn}
              </button>
            </div>
          </div>
        </section>
      );

      const Instructions = ({ content, setCurrentPage, openLightbox }) => {
        const [activeStep, setActiveStep] = useState(0);
        const images = [
          "https://pbs.twimg.com/media/HDor64KXMAAdzmK?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDor64KWYAAWXv6?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDor64WX0AAxNPu?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDor8KoXsAADR7G?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDoshqWW0AA4bqH?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDosiThXYAA8xiE?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDoskZqWUAAP972?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDoskZtXwAECtUr?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDoucfnW4AAOQh6?format=jpg&name=4096x4096",
          "https://pbs.twimg.com/media/HDoudHVWkAA76oE?format=jpg&name=4096x4096"
        ];

        const nextStep = () => setActiveStep(p => Math.min(images.length - 1, p + 1));
        const prevStep = () => setActiveStep(p => Math.max(0, p - 1));

        return (
          <section className="min-h-screen pt-32 pb-24 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto relative">
            <button onClick={() => {
              setCurrentPage('home');
              setTimeout(() => {
                document.getElementById('instructions-teaser')?.scrollIntoView({ behavior: 'instant' });
              }, 0);
            }} className="mb-12 text-stone-400 hover:text-amber-500 transition-colors font-heading tracking-wider uppercase text-sm flex items-center gap-2">
              {content.instructions.back}
            </button>
            <div className="text-center mb-16">
              <h1 className="text-4xl md:text-6xl font-heading font-bold text-stone-100 mb-6">{content.instructions.title}</h1>
              <div className="w-24 h-1 bg-amber-700 mx-auto rounded-full mb-6"></div>
              <p className="text-amber-500/80 italic text-sm md:text-base flex items-center justify-center gap-2">
                <Globe size={16} />
                {content.instructions.comingSoon}
              </p>
            </div>
            
            <div className="bg-stone-900/60 border border-stone-800 rounded-2xl p-4 md:p-8 shadow-2xl backdrop-blur-sm">
              {/* Main Image Area */}
              <div className="relative rounded-xl overflow-hidden bg-stone-950 h-[50vh] md:h-[65vh] flex items-center justify-center border border-stone-800/50">
                {images.map((src, idx) => (
                  <img 
                    key={idx}
                    src={src} 
                    alt={`Instruction step ${idx + 1}`} 
                    className={`absolute inset-0 w-full h-full object-contain cursor-pointer transition-opacity duration-300 will-change-[opacity] ${activeStep === idx ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'}`}
                    onClick={() => activeStep === idx && openLightbox(src)}
                    referrerPolicy="no-referrer"
                    loading={idx === 0 ? "eager" : "lazy"}
                  />
                ))}

                {/* Navigation Buttons */}
                <button 
                  onClick={(e) => { e.stopPropagation(); prevStep(); }} 
                  disabled={activeStep === 0}
                  className="absolute left-4 top-1/2 -translate-y-1/2 bg-stone-950/80 text-amber-500 p-3 rounded-full border border-amber-900/50 hover:bg-amber-900 hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed z-20 shadow-xl"
                >
                  <ChevronLeft size={24} />
                </button>
                <button 
                  onClick={(e) => { e.stopPropagation(); nextStep(); }} 
                  disabled={activeStep === images.length - 1}
                  className="absolute right-4 top-1/2 -translate-y-1/2 bg-stone-950/80 text-amber-500 p-3 rounded-full border border-amber-900/50 hover:bg-amber-900 hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed z-20 shadow-xl"
                >
                  <ChevronRight size={24} />
                </button>

                {/* Step Counter Badge */}
                <div className="absolute top-4 left-4 bg-stone-950/90 text-amber-500 px-4 py-2 rounded-lg font-heading font-bold tracking-widest border border-amber-900/50 shadow-lg z-20">
                  {activeStep + 1} / {images.length}
                </div>
              </div>

              {/* Thumbnails Strip */}
              <div className="flex gap-3 mt-6 overflow-x-auto pb-4 snap-x snap-mandatory scrollbar-thin scrollbar-thumb-amber-900/50 scrollbar-track-stone-900">
                {images.map((src, idx) => (
                  <button 
                    key={idx} 
                    onClick={() => setActiveStep(idx)} 
                    className={`relative shrink-0 w-20 h-28 md:w-24 md:h-32 rounded-lg overflow-hidden border-2 transition-all snap-center ${activeStep === idx ? 'border-amber-500 opacity-100 shadow-[0_0_15px_rgba(217,119,6,0.4)] scale-105' : 'border-stone-800 opacity-50 hover:opacity-100 hover:border-amber-700/50'}`}
                  >
                    <img src={src} className="w-full h-full object-cover" referrerPolicy="no-referrer" />
                    <div className="absolute bottom-0 right-0 bg-stone-950/90 text-amber-500 text-xs px-2 py-1 rounded-tl-lg font-bold border-t border-l border-amber-900/30">
                      {idx + 1}
                    </div>
                  </button>
                ))}
              </div>
            </div>
          </section>
        );
      };

      const Footer = ({ content }) => (
        <footer className="bg-stone-950 border-t border-stone-900 py-16 relative z-10">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-center md:text-left items-start">
              <div className="flex flex-col items-center md:items-start space-y-6">
                <h4 className="text-stone-300 font-heading tracking-[0.2em] uppercase text-xs border-b border-amber-900/30 pb-2 w-full max-w-[160px] text-center md:text-left">{content.footer.contactTitle}</h4>
                <a href={`https://mail.google.com/mail/?view=cm&fs=1&to=${SOCIALS.email}`} target="_blank" rel="noopener noreferrer" className="flex items-center gap-3 text-white hover:text-amber-400 transition-all duration-300 group">
                  <div className="p-2 bg-stone-900 rounded-full border border-stone-800 group-hover:border-amber-900/50"><Mail size={18} /></div>
                  <span className="text-sm font-bold tracking-widest select-all">{SOCIALS.email}</span>
                </a>
              </div>
              <div className="flex flex-col items-center space-y-6">
                <h4 className="text-stone-300 font-heading tracking-[0.2em] uppercase text-xs border-b border-amber-900/30 pb-2 w-full max-w-[160px] text-center">{content.footer.socialTitle}</h4>
                <div className="flex space-x-4">
                  <a href={SOCIALS.twitter} target="_blank" rel="noopener noreferrer" className="social-btn">
                    <svg className="svgIcon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/>
                    </svg>
                    <span className="social-text">Twitter</span>
                  </a>
                  <a href={SOCIALS.instagram} target="_blank" rel="noopener noreferrer" className="social-btn">
                    <Instagram className="svgIcon" />
                    <span className="social-text">Instagram</span>
                  </a>
                  <a href={SOCIALS.tiktok} target="_blank" rel="noopener noreferrer" className="social-btn">
                    <svg className="svgIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" />
                    </svg>
                    <span className="social-text">TikTok</span>
                  </a>
                </div>
              </div>
              <div className="flex flex-col items-center md:items-end space-y-4">
                <h3 className="font-heading text-2xl font-bold text-stone-100">ARTUM <span className="text-amber-700">UB</span></h3>
                <p className="text-stone-400 text-sm tracking-wide text-center md:text-right">{content.footer.rights}</p>
              </div>
            </div>
          </div>
        </footer>
      );

      const BACKGROUND_VIDEOS = [
        "https://cdn.akamai.steamstatic.com/steamcommunity/public/images/items/1684350/83de58962f68ab5151573386be4901f84f5bd6f2.mp4",
        "https://cdn.akamai.steamstatic.com/steamcommunity/public/images/items/252490/4a6d56ec1c9475f768ba6a67c13a57cd61c82b4e.mp4",
        "https://cdn.akamai.steamstatic.com/steamcommunity/public/images/items/556130/627dc1205a466b1ec9ff394572b3b01cd044bc41.mp4",
        "https://cdn.akamai.steamstatic.com/steamcommunity/public/images/items/1313140/c80d1a3ea315f69f72cbb77bffe42c5ed0f7b945.mp4",
        "https://cdn.akamai.steamstatic.com/steamcommunity/public/images/items/251110/b9996069db263832bf303d54c7c48201b6188998.mp4"
      ];

      const App = () => {
        const [lang, setLang] = useState('no');
        const [currentPage, setCurrentPage] = useState('home');
        const [lightboxSrc, setLightboxSrc] = useState(null);
        const [bgVideo] = useState(() => BACKGROUND_VIDEOS[Math.floor(Math.random() * BACKGROUND_VIDEOS.length)]);
        
        const content = CONTENT[lang];
        return (
          <div className="min-h-screen text-stone-100 selection:bg-amber-900 selection:text-white">
            <video className="video-bg" autoPlay muted loop playsInline key={bgVideo}>
              <source src={bgVideo} type="video/mp4" />
            </video>
            <div className="fixed top-0 left-0 w-full h-16 md:h-20 bg-stone-950 z-40 transition-all duration-300"></div>
            <Navbar content={content} lang={lang} setLang={setLang} setCurrentPage={setCurrentPage} />
            <main className="relative z-0">
              {currentPage === 'home' ? (
                <>
                  <Hero content={content} />
                  <About content={content} />
                  <Team content={content} />
                  <Features content={content} />
                  <Gallery content={content} openLightbox={setLightboxSrc} />
                  <InstructionTeaser content={content} setCurrentPage={setCurrentPage} />
                  <OurGame content={content} openLightbox={setLightboxSrc} />
                </>
              ) : (
                <Instructions content={content} setCurrentPage={setCurrentPage} openLightbox={setLightboxSrc} />
              )}
            </main>
            <Footer content={content} />
            <Lightbox src={lightboxSrc} onClose={() => setLightboxSrc(null)} />
          </div>
        );
      };

      const root = createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
